<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    </style>
    <clipPath id="bar1"><rect x="0" y="0" width="800" height="10" rx="5"/></clipPath>
    <clipPath id="bar2"><rect x="0" y="0" width="800" height="10" rx="5"/></clipPath>
    <clipPath id="bar3"><rect x="0" y="0" width="800" height="10" rx="5"/></clipPath>
    <clipPath id="bar4"><rect x="0" y="0" width="800" height="10" rx="5"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="#1a1a2e"/>

  <!-- Header -->
  <text x="32" y="44" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#e0e0e0" letter-spacing="2">DSA PROGRESS</text>
  <text x="178" y="44" font-family="'JetBrains Mono', monospace" font-size="13" fill="#888" letter-spacing="1"> Java · LeetCode</text>

  <!-- Divider -->
  <line x1="32" y1="56" x2="768" y2="56" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Binary Search -->
  <text x="32" y="88" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#f0f0f0">Binary Search</text>
  <rect x="620" y="73" width="112" height="24" rx="12" fill="#0F6E56"/>
  <text x="676" y="89" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#9FE1CB" text-anchor="middle">✓ Done</text>
  <rect x="32" y="98" width="736" height="8" rx="4" fill="#2a2a3e"/>
  <rect x="32" y="98" width="736" height="8" rx="4" fill="#1D9E75"/>

  <!-- Sorting -->
  <text x="32" y="148" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#f0f0f0">Sorting</text>
  <rect x="620" y="133" width="112" height="24" rx="12" fill="#0F6E56"/>
  <text x="676" y="149" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#9FE1CB" text-anchor="middle">✓ Done</text>
  <rect x="32" y="158" width="736" height="8" rx="4" fill="#2a2a3e"/>
  <rect x="32" y="158" width="736" height="8" rx="4" fill="#1D9E75"/>
  <text x="32" y="178" font-family="'JetBrains Mono', monospace" font-size="11" fill="#666">Bubble · Selection · Insertion · Cyclic</text>

  <!-- Strings -->
  <text x="32" y="210" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#f0f0f0">Strings</text>
  <rect x="608" y="195" width="124" height="24" rx="12" fill="#854F0B"/>
  <text x="670" y="211" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#FAC775" text-anchor="middle">In Progress</text>
  <rect x="32" y="220" width="736" height="8" rx="4" fill="#2a2a3e"/>
  <rect x="32" y="220" width="310" height="8" rx="4" fill="#EF9F27"/>

  <!-- Recursion -->
  <text x="32" y="252" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#f0f0f0">Recursion</text>
  <rect x="614" y="237" width="118" height="24" rx="12" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
  <text x="673" y="253" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#666" text-anchor="middle">Up Next</text>
  <rect x="32" y="262" width="736" height="8" rx="4" fill="#2a2a3e"/>

  <!-- Footer legend -->
  <circle cx="40" cy="286" r="5" fill="#1D9E75"/>
  <text x="52" y="290" font-family="'JetBrains Mono', monospace" font-size="11" fill="#888">Completed</text>
  <circle cx="138" cy="286" r="5" fill="#EF9F27"/>
  <text x="150" y="290" font-family="'JetBrains Mono', monospace" font-size="11" fill="#888">In progress</text>
  <circle cx="246" cy="286" r="5" fill="#444"/>
  <text x="258" y="290" font-family="'JetBrains Mono', monospace" font-size="11" fill="#888">Up next</text>
</svg>
